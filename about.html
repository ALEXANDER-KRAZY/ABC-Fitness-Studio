<!DOCTYPE html>
<html>
<head>
<title>About Us</title>
<link rel="stylesheet" href="css/styles.css">
<script src="js/form.js"></script>
</head>

<body>

<header>
<h1>ABC Fitness Studio</h1>
</header>

<section>

<h2>About Us</h2>

<p>
ABC Fitness Studio provides Yoga,
Pilates and Zumba classes while
supporting healthy lifestyles.
</p>

<h3>Hours of Operation</h3>

<ul>
<li>Monday-Friday: 6am - 8pm</li>
<li>Saturday: 8am - 6pm</li>
<li>Sunday: Closed</li>
</ul>

<h3>Feedback & Custom Orders</h3>

<form id="feedbackForm"
onsubmit="saveForm(event)">

<input type="text"
id="name"
placeholder="Name"
required>

<input type="email"
id="email"
placeholder="Email"
required>

<textarea id="feedback"
placeholder="Feedback"></textarea>

<textarea id="order"
placeholder="Custom Order"></textarea>

<button type="submit">
Submit
</button>

</form>

</section>

</body>
</html>
