<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/cart.js"></script>
</head>
<body>

<header>
    <h1>Gallery</h1>
    <button onclick="viewCart()">View Cart</button>
</header>

<section class="grid">

<!-- 9 REQUIRED ITEMS -->

<div class="card">
<img src="images/individual-yoga.jpg">
<h3>Individual Yoga</h3>
<button onclick="addToCart('Individual Yoga')">Add</button>
</div>

<div class="card">
<img src="images/group-yoga.jpg">
<h3>Group Yoga</h3>
<button onclick="addToCart('Group Yoga')">Add</button>
</div>

<div class="card">
<img src="images/individual-pilates.jpg">
<h3>Individual Pilates</h3>
<button onclick="addToCart('Individual Pilates')">Add</button>
</div>

<div class="card">
<img src="images/group-pilates.jpg">
<h3>Group Pilates</h3>
<button onclick="addToCart('Group Pilates')">Add</button>
</div>

<div class="card">
<img src="images/individual-kickboxing.jpg">
<h3>Individual Kickboxing</h3>
<button onclick="addToCart('Individual Kickboxing')">Add</button>
</div>

<div class="card">
<img src="images/group-kickboxing.jpg">
<h3>Group Kickboxing</h3>
<button onclick="addToCart('Group Kickboxing')">Add</button>
</div>

<div class="card">
<img src="images/yoga-mat.jpg">
<h3>Yoga Mat</h3>
<button onclick="addToCart('Yoga Mat')">Add</button>
</div>

<div class="card">
<img src="images/water-bottle.jpg">
<h3>Water Bottle</h3>
<button onclick="addToCart('Water Bottle')">Add</button>
</div>

<div class="card">
<img src="images/tee-shirt.jpg">
<h3>Tee Shirt</h3>
<button onclick="addToCart('Tee Shirt')">Add</button>
</div>

</section>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <h2>Your Cart</h2>
        <ul id="cartItems"></ul>

        <button onclick="clearCart()">Clear</button>
        <button onclick="processOrder()">Checkout</button>
        <button onclick="closeCart()">Close</button>
    </div>
</div>

</body>
</html>
